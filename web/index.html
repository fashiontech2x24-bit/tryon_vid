<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wan VACE — Video Try-On Demo</title>
<style>
  :root { --bg:#0e1116; --card:#171b22; --line:#262c36; --fg:#e6e9ef; --mut:#8b94a3; --acc:#4f8cff; --err:#ff6b6b; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 60px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--mut); margin: 0 0 22px; font-size: 13px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  @media (max-width:760px){ .grid { grid-template-columns: 1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  label { display:block; font-size:12px; color:var(--mut); margin:0 0 6px; text-transform:uppercase; letter-spacing:.04em; }
  input[type=file], textarea, input[type=number] {
    width:100%; background:#0f131a; border:1px solid var(--line); color:var(--fg);
    border-radius:8px; padding:9px 10px; font:inherit;
  }
  textarea { resize:vertical; min-height:70px; }
  .drop { border:1.5px dashed var(--line); border-radius:10px; padding:14px; text-align:center; color:var(--mut); cursor:pointer; }
  .drop.has { border-color:var(--acc); color:var(--fg); }
  video, img.prev { width:100%; border-radius:8px; margin-top:10px; background:#000; max-height:340px; object-fit:contain; }
  button { background:var(--acc); color:#fff; border:0; border-radius:9px; padding:12px 18px; font:inherit; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:14px; align-items:center; margin-top:18px; flex-wrap:wrap; }
  details { margin-top:16px; } summary { cursor:pointer; color:var(--mut); font-size:13px; }
  .adv { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; margin-top:12px; }
  @media (max-width:760px){ .adv { grid-template-columns: repeat(2,1fr); } }
  .bar { height:10px; background:#0f131a; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:0; background:var(--acc); transition:width .3s; }
  .stage { font-size:13px; color:var(--mut); margin-top:8px; }
  .err { color:var(--err); }
  .pill { font-size:12px; padding:3px 8px; border-radius:20px; border:1px solid var(--line); color:var(--mut); }
  a.dl { color:var(--acc); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Wan 2.1 VACE — Video Try-On</h1>
  <p class="sub">Reference image + control video → generated video. <span id="health" class="pill">checking…</span></p>

  <div class="grid">
    <div class="card">
      <label>Reference image</label>
      <div class="drop" id="imgDrop">Click or drop an image</div>
      <input id="imgFile" type="file" accept="image/*" hidden />
      <img id="imgPrev" class="prev" hidden />
    </div>
    <div class="card">
      <label>Control video</label>
      <div class="drop" id="vidDrop">Click or drop a video</div>
      <input id="vidFile" type="file" accept="video/*" hidden />
      <video id="vidPrev" controls muted hidden></video>
    </div>
  </div>

  <details>
    <summary>Advanced settings (tuning)</summary>
    <div style="margin-top:12px">
      <label>Positive prompt</label>
      <textarea id="positive"></textarea>
    </div>
    <div class="adv">
      <div><label>Width</label><input id="width" type="number" placeholder="768" /></div>
      <div><label>Height</label><input id="height" type="number" placeholder="1024" /></div>
      <div><label>Frames</label><input id="length" type="number" placeholder="29" /></div>
      <div><label>FPS</label><input id="fps" type="number" placeholder="12" /></div>
      <div><label>Steps</label><input id="steps" type="number" placeholder="4" /></div>
      <div><label>CFG</label><input id="cfg" type="number" step="0.1" placeholder="1" /></div>
      <div><label>LoRA strength</label><input id="lora_strength" type="number" step="0.05" placeholder="0.3" /></div>
      <div><label>Shift</label><input id="shift" type="number" step="0.5" placeholder="4" /></div>
      <div><label>Seed (blank=random)</label><input id="seed" type="number" placeholder="random" /></div>
    </div>
  </details>

  <div class="row">
    <button id="go">Generate video</button>
    <span id="stageWrap" class="stage" hidden></span>
  </div>
  <div class="bar" id="barWrap" hidden style="margin-top:12px"><i id="bar"></i></div>

  <div class="card" id="resultCard" hidden style="margin-top:18px">
    <label>Result</label>
    <video id="outVid" controls autoplay loop muted></video>
    <div class="row"><a id="dl" class="dl" href="#" download>⬇ Download mp4</a></div>
  </div>
</div>

<script>
const DEFAULT_POSITIVE = "High-fidelity, cinematic fashion video of the model from the reference image. The camera remains completely static and fixed in place.The fabric of the garment drapes naturally, displaying realistic physical movement, soft folds, and consistent texture as the torso rotates. The soft, diffused key lighting highlights the fabric weave, preserving the garment’s logos and structural integrity.static locked-off camera, fixed tripod shot, no camera movement, no panning, no tilting, no zooming, no dolly, no trucking, no handheld motion, no camera shake, subject motion only";
const $ = id => document.getElementById(id);
$("positive").value = DEFAULT_POSITIVE;

function wireDrop(dropId, inputId, kind) {
  const drop = $(dropId), input = $(inputId);
  drop.onclick = () => input.click();
  ["dragover"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("has"); }));
  drop.addEventListener("dragleave", () => drop.classList.remove("has"));
  drop.addEventListener("drop", ev => { ev.preventDefault(); input.files = ev.dataTransfer.files; input.onchange(); });
  input.onchange = () => {
    const f = input.files[0]; if (!f) return;
    drop.classList.add("has"); drop.textContent = f.name;
    const url = URL.createObjectURL(f);
    if (kind === "img") { $("imgPrev").src = url; $("imgPrev").hidden = false; }
    else { $("vidPrev").src = url; $("vidPrev").hidden = false; }
  };
}
wireDrop("imgDrop", "imgFile", "img");
wireDrop("vidDrop", "vidFile", "vid");

async function checkHealth() {
  try {
    const r = await fetch("/api/health"); const j = await r.json();
    const el = $("health");
    el.textContent = j.comfy_up ? "ComfyUI ready" : "ComfyUI offline";
    el.style.color = j.comfy_up ? "#6fd28a" : "var(--err)";
  } catch { $("health").textContent = "server unreachable"; }
}
checkHealth(); setInterval(checkHealth, 8000);

const OPT_FIELDS = ["positive","width","height","length","fps","steps","cfg","lora_strength","shift","seed"];

$("go").onclick = async () => {
  if (!$("imgFile").files[0] || !$("vidFile").files[0]) { alert("Pick both an image and a control video."); return; }
  const fd = new FormData();
  fd.append("image", $("imgFile").files[0]);
  fd.append("video", $("vidFile").files[0]);
  OPT_FIELDS.forEach(k => fd.append(k, $(k).value));

  $("go").disabled = true;
  $("resultCard").hidden = true;
  $("barWrap").hidden = false; $("bar").style.width = "0%";
  setStage("Uploading…");

  let job;
  try {
    const r = await fetch("/api/generate", { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
    job = (await r.json()).job_id;
  } catch (e) { fail("Submit failed: " + e.message); return; }
  poll(job);
};

function setStage(text, isErr=false) {
  const w = $("stageWrap"); w.hidden = false; w.textContent = text;
  w.className = "stage" + (isErr ? " err" : "");
}
function fail(msg) { setStage(msg, true); $("go").disabled = false; $("barWrap").hidden = true; }

async function poll(job) {
  try {
    const r = await fetch("/api/status/" + job);
    const j = await r.json();
    $("bar").style.width = Math.round((j.progress || 0) * 100) + "%";
    if (j.status === "error") return fail("Error: " + (j.error || "unknown"));
    if (j.status === "done") {
      setStage("Done.");
      $("go").disabled = false;
      $("outVid").src = "/api/preview/" + job;
      $("dl").href = "/api/result/" + job;
      $("resultCard").hidden = false;
      return;
    }
    setStage(j.stage || j.status || "working…");
    setTimeout(() => poll(job), 1200);
  } catch (e) {
    setTimeout(() => poll(job), 2000); // transient; keep trying
  }
}
</script>
</body>
</html>
